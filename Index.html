<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.todo-box{
background:white;
padding:30px;
border-radius:15px;
width:100%;
max-width:650px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.completed{
text-decoration: line-through;
opacity:0.6;
}

</style>

</head>

<body>

<div class="todo-box">

<h2 class="text-center mb-4">📝 Todo Manager</h2>

<div class="input-group mb-4">
<input id="taskInput" class="form-control" placeholder="Enter task...">
<button class="btn btn-primary" onclick="addTask()">Add</button>
</div>

<div class="mb-3 text-center">
<button class="btn btn-outline-dark btn-sm" onclick="filterTasks('all')">All</button>
<button class="btn btn-outline-warning btn-sm" onclick="filterTasks('pending')">Pending</button>
<button class="btn btn-outline-success btn-sm" onclick="filterTasks('completed')">Completed</button>
</div>

<ul id="taskList" class="list-group"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("todo_tasks")) || [];
let filter = "all";

function saveTasks(){
localStorage.setItem("todo_tasks", JSON.stringify(tasks));
}

function addTask(){

let input = document.getElementById("taskInput");

if(input.value.trim() === "") return;

let task = {
id: Date.now(),
text: input.value,
completed:false
};

tasks.push(task);

saveTasks();

input.value="";

renderTasks();

}

function renderTasks(){

let list = document.getElementById("taskList");

list.innerHTML="";

let filteredTasks = tasks.filter(task=>{

if(filter === "pending") return !task.completed;
if(filter === "completed") return task.completed;

return true;

});

filteredTasks.forEach(task=>{

let li=document.createElement("li");

li.className="list-group-item d-flex justify-content-between align-items-center";

if(task.completed) li.classList.add("completed");

li.innerHTML=`

<span>${task.text}</span>

<div>

<button class="btn btn-success btn-sm" onclick="toggleTask(${task.id})">
${task.completed ? "Undo" : "Done"}
</button>

<button class="btn btn-warning btn-sm" onclick="editTask(${task.id})">
Edit
</button>

<button class="btn btn-danger btn-sm" onclick="deleteTask(${task.id})">
Delete
</button>

</div>

`;

list.appendChild(li);

});

}

function toggleTask(id){

tasks = tasks.map(task=>{

if(task.id === id) task.completed = !task.completed;

return task;

});

saveTasks();

renderTasks();

}

function editTask(id){

let task = tasks.find(t=>t.id === id);

let updated = prompt("Edit task", task.text);

if(updated !== null){

task.text = updated;

saveTasks();

renderTasks();

}

}

function deleteTask(id){

tasks = tasks.filter(task=>task.id !== id);

saveTasks();

renderTasks();

}

function filterTasks(type){

filter = type;

renderTasks();

}

renderTasks();

</script>

</body>

</html>
